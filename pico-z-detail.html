<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Piko Z - The Next Generation | Xenon Industry</title>
    <link rel="stylesheet" href="modern-enhancements.css" />

    <!-- GSAP for animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <script src="js/video-autoplay.js"></script>
    <link rel="icon" type="image/png" href="assets/Xenon Industries Logo.png" />
    <style>
        :root {
            --pico-z-theme: #00f2fe;
        }

        .picoz-detail-hero {
            position: relative;
            height: 100vh;
            width: 100%;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }

        .hero-video-bg {
            position: absolute;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            transform: translate(-50%, -50%);
            object-fit: cover;
            opacity: 0.6;
            filter: saturate(1.2) brightness(0.8);
        }

        .hero-detail-content {
            position: relative;
            z-index: 10;
            text-align: center;
            color: white;
            padding: 2rem;
        }

        .hero-detail-title {
            font-family: var(--font-display);
            font-size: clamp(3rem, 10vw, 6rem);
            font-weight: 900;
            color: white;
            line-height: 0.9;
            letter-spacing: -0.04em;
            margin-bottom: 2rem;
            text-transform: uppercase;
        }

        .hero-detail-title span {
            display: block;
            background: linear-gradient(90deg, #fff, var(--pico-z-theme));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Liquid Video Section */
        .liquid-video-section {
            position: relative;
            height: 200vh;
            background: #000;
        }

        .video-reveal-container {
            position: sticky;
            top: 0;
            height: 100vh;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .liquid-video-wrapper {
            position: relative;
            width: 60%;
            aspect-ratio: 16/9;
            border-radius: 40px;
            overflow: hidden;
            transform: scale(0.8);
            transition: border-radius 0.5s ease;
        }

        .liquid-video-wrapper.is-full {
            border-radius: 0;
        }

        .liquid-video-wrapper iframe {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100%;
            height: 100%;
            transform: translate(-50%, -50%) scale(1.1);
            /* Slight scale to hide black bars */
            pointer-events: none;
        }

        .back-btn-container {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
        }

        .btn-back {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 1rem 2rem;
            border-radius: 100px;
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-back:hover {
            background: white;
            color: black;
            transform: translateY(-5px);
        }

        /* Scroll Info */
        .scroll-down-hint {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.8rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }

        .hint-bar {
            width: 1px;
            height: 60px;
            background: linear-gradient(to bottom, var(--pico-z-theme), transparent);
        }

        /* Sound Toggle */
        .sound-toggle {
            position: fixed;
            top: 100px;
            right: 40px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .sound-toggle:hover {
            background: white;
            color: black;
            transform: scale(1.1);
        }

        .sound-toggle svg {
            width: 24px;
            height: 24px;
        }
    </style>
</head>

<body style="background: #000; color: white;">

    <!-- Navigation -->
    <nav class="nav-modern scrolled" id="navModern">
        <div class="nav-container-modern">
            <a href="index.html" class="nav-logo-modern">
                <img src="assets/Xenon Industries Logo.png" alt="Xenon Industries" class="nav-logo-img" />
            </a>
            <ul class="nav-menu-modern" id="navMenu">
                <li><a href="index.html" class="nav-link-modern">Home</a></li>
                <li><a href="about.html" class="nav-link-modern">About</a></li>
                <li><a href="features.html" class="nav-link-modern">Features</a></li>
                <li><a href="manga-series.html" class="nav-link-modern">Manga</a></li>
                <li><a href="contact.html" class="nav-link-modern">Contact</a></li>
            </ul>
        </div>
    </nav>

    <main>
        <!-- Real Video Hero -->
        <section class="picoz-detail-hero">
            <video class="hero-video-bg" id="heroVideo" autoplay loop playsinline>
                <source src="assets/Gen Z.mp4" type="video/mp4">
            </video>
            <div class="hero-detail-content">
                <h1 class="hero-detail-title">
                    Piko Z <span>Revolution</span>
                </h1>
                <p style="font-size: 1.2rem; opacity: 0.7; max-width: 600px; margin: 0 auto;">
                    Experience the future of companion robotics. Fluid, responsive, and intelligently alive.
                </p>
            </div>
            <div class="scroll-down-hint">
                <span>Scroll to Discover</span>
                <div class="hint-bar"></div>
            </div>
        </section>

        <!-- Tube Liquid Section -->
        <section class="liquid-reveal-section">
            <div class="video-reveal-container">
                <div class="liquid-video-wrapper" id="videoWrapper">
                    <iframe id="youtubeIframe"
                        src="https://www.youtube.com/embed/6ndrZoAlMeg?autoplay=1&mute=1&controls=0&loop=1&playlist=6ndrZoAlMeg&enablejsapi=1&rel=0"
                        title="Piko Z Product Film" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen>
                    </iframe>
                </div>
            </div>
        </section>
    </main>

    <div class="sound-toggle" id="soundToggle" title="Toggle Sound">
        <svg id="soundOn" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display: none;">
            <path d="M11 5L6 9H2v6h4l5 4V5zM19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07" />
        </svg>
        <svg id="soundOff" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M11 5L6 9H2v6h4l5 4V5zM23 9l-6 6M17 9l6 6" />
        </svg>
    </div>

    <div class="back-btn-container">
        <a href="index.html" class="btn-back">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 12H5M12 19l-7-7 7-7" />
            </svg>
            Back to Home
        </a>
    </div>

    <!-- GSAP ScrollTrigger Script -->
    <script>
        gsap.registerPlugin(ScrollTrigger);

        // Liquid Expansion Animation
        gsap.to("#videoWrapper", {
            width: "100%",
            height: "100vh",
            borderRadius: "0",
            scale: 1,
            ease: "none",
            scrollTrigger: {
                trigger: ".liquid-reveal-section",
                start: "top top",
                end: "bottom bottom",
                scrub: 1,
            }
        });

        // Dedicated Playback Controller (Ensures reliability)
        ScrollTrigger.create({
            trigger: ".liquid-reveal-section",
            start: "top 80%", // Start playing as soon as it comes into view
            end: "bottom 20%",
            onEnter: () => {
                XenonVideo.play('youtubeIframe');
                XenonVideo.unmute('youtubeIframe');
            },
            onEnterBack: () => {
                XenonVideo.play('youtubeIframe');
                XenonVideo.unmute('youtubeIframe');
            },
            onLeave: () => {
                XenonVideo.pause('youtubeIframe');
                XenonVideo.mute('youtubeIframe');
            },
            onLeaveBack: () => {
                XenonVideo.pause('youtubeIframe');
                XenonVideo.mute('youtubeIframe');
            }
        });

        // Hide Navbar during Video Scroll
        gsap.to("#navModern", {
            y: "-100%",
            scrollTrigger: {
                trigger: ".liquid-reveal-section",
                start: "top 20%",
                end: "top top",
                scrub: true,
            }
        });

        // Show Navbar back after Video Section
        gsap.to("#navModern", {
            y: "0%",
            scrollTrigger: {
                trigger: ".liquid-reveal-section",
                start: "bottom top",
                end: "bottom -10%",
                scrub: true,
            }
        });

        // Hide Sound Toggle and Back Button during Video Expansion
        gsap.to(["#soundToggle", ".back-btn-container"], {
            opacity: 0,
            pointerEvents: "none",
            scrollTrigger: {
                trigger: ".liquid-reveal-section",
                start: "top 20%",
                end: "top top",
                scrub: true,
            }
        });

        // Hero Parallax
        gsap.to(".hero-video-bg", {
            y: "30%",
            scrollTrigger: {
                trigger: ".picoz-detail-hero",
                start: "top top",
                end: "bottom top",
                scrub: true
            }
        });

        gsap.to(".hero-detail-content", {
            y: -100,
            opacity: 0,
            scrollTrigger: {
                trigger: ".picoz-detail-hero",
                start: "top top",
                end: "bottom 30%",
                scrub: true
            }
        });

        // Sound Logic
        const soundToggle = document.getElementById('soundToggle');
        const heroVideo = document.getElementById('heroVideo');
        const youtubeIframe = document.getElementById('youtubeIframe');
        const soundOnIcon = document.getElementById('soundOn');
        const soundOffIcon = document.getElementById('soundOff');
        let isMuted = true;

        // Try to play hero video muted first (as browsers block unmuted autoplay)
        heroVideo.muted = true;

        soundToggle.addEventListener('click', () => {
            isMuted = !isMuted;
            heroVideo.muted = isMuted;

            // Toggle YouTube Sound via postMessage (YouTube Iframe API shorthand)
            const ytAction = isMuted ? 'mute' : 'unMute';
            youtubeIframe.contentWindow.postMessage(JSON.stringify({
                event: 'command',
                func: ytAction,
                args: []
            }), '*');

            // Update UI
            soundOnIcon.style.display = isMuted ? 'none' : 'block';
            soundOffIcon.style.display = isMuted ? 'block' : 'none';
        });

        // Initialize YouTube volume state
        youtubeIframe.onload = () => {
            youtubeIframe.contentWindow.postMessage(JSON.stringify({
                event: 'command',
                func: 'mute',
                args: []
            }), '*');
        };

    </script>

    <script src="js/security.js"></script>
</body>

</html>
